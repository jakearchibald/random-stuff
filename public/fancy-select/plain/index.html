<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Fancy Select</title>
  </head>
  <body>
    <div class="custom-select-demo">
      <div class="select-button">
        <span
          class="lang-icon"
          style="color: #519aba"
          data-char="&#xE048;"
        ></span>
        HTML
      </div>

      <div class="box">
        <div class="group">
          <div class="group-label">Markup Languages</div>
          <div class="option">
            <span
              class="lang-icon"
              style="color: #519aba"
              data-char="&#xE048;"
            ></span>
            HTML
          </div>
          <div class="option">
            <span
              class="lang-icon"
              style="color: #519aba"
              data-char="&#xE01D;"
            ></span>
            CSS
          </div>
          <div class="option">
            <span
              class="lang-icon"
              style="color: #a074c4"
              data-char="&#xE091;"
            ></span>
            SVG
          </div>
        </div>

        <div class="group">
          <div class="group-label">Scripting Languages</div>
          <div class="option">
            <span
              class="lang-icon"
              style="color: #cbcb41"
              data-char="&#xE051;"
            ></span>
            JavaScript
          </div>
          <div class="option">
            <span
              class="lang-icon"
              style="color: #519aba"
              data-char="&#xE07B;"
            ></span>
            Python
          </div>
          <div class="option">
            <span
              class="lang-icon"
              style="color: #cc3e44"
              data-char="&#xE081;"
            ></span>
            Ruby
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
