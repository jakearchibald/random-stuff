<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>contrast-color() demo</title>
    <style>
      @property --bg {
        syntax: '<color>';
        inherits: true;
        initial-value: #3264c8;
      }

      body {
        font-family: sans-serif;
        display: grid;
        justify-items: center;
        gap: 2rem;
        padding: 3rem;
        background: #f0f0f0;
      }

      h1 {
        margin: 0;
        text-align: center;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: auto auto;
        gap: 1rem 2rem;
      }

      .col {
        display: grid;
        grid-row: span 3;
        grid-template-rows: subgrid;
        justify-items: center;
        gap: 1rem 2rem;
      }

      .col h2 {
        font-size: 0.85rem;
        font-weight: 600;
        text-align: center;
        margin: 0;
      }

      .btn {
        background: var(--bg);
        border: none;
        border-radius: 0.5rem;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        min-width: 180px;
      }

      /* contrast-color() picks the accessible contrast color automatically */
      .btn--auto {
        color: contrast-color(var(--bg));
      }

      .btn--opposite {
        color: color(
          from contrast-color(var(--bg)) srgb calc(1 - r) calc(1 - g)
            calc(1 - b)
        );
      }

      .btn--flipped {
        color: var(--bg);
        background: contrast-color(var(--bg));
      }

      .btn--flipped-opposite {
        color: var(--bg);
        background: color(
          from contrast-color(var(--bg)) srgb calc(1 - r) calc(1 - g)
            calc(1 - b)
        );
      }

      .btn--oklch {
        color: oklch(from var(--bg) calc((0.7 - l) * infinity) 0 0);
      }

      .btn--oklch-flipped {
        background: oklch(from var(--bg) calc((0.7 - l) * infinity) 0 0);
        color: var(--bg);
      }

      label {
        display: grid;
        grid-auto-flow: column;
        align-items: center;
        gap: 1rem;
        font-size: 1.1rem;
      }

      input[type='color'] {
        width: 3rem;
        height: 3rem;
        border: none;
        background: none;
        cursor: pointer;
      }

      @media (max-width: 720px) {
        .buttons {
          grid-template-columns: 1fr;
          grid-template-rows: none;
        }

        .col {
          grid-row: span 1;
          grid-template-rows: none;
          gap: 1rem;
          margin-bottom: 2em;
        }

        .col h2 {
          margin: 0;
        }
      }

      p {
        max-width: 60ch;
        text-align: center;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <h1>contrast-color() demo</h1>

    <div class="buttons">
      <div class="col">
        <h2>contrast-color()</h2>
        <button class="btn btn--auto">Button text</button>
        <button class="btn btn--flipped">Button text</button>
      </div>

      <div class="col">
        <h2>opposite</h2>
        <button class="btn btn--opposite">Button text</button>
        <button class="btn btn--flipped-opposite">Button text</button>
      </div>

      <div class="col">
        <h2>
          <a
            href="https://css-tricks.com/approximating-contrast-color-with-other-css-features/"
            target="_blank"
            rel="noopener noreferrer"
            >oklch 0.7 lightness</a
          >
        </h2>
        <button class="btn btn--oklch">Button text</button>
        <button class="btn btn--oklch-flipped">Button text</button>
      </div>
    </div>

    <label>
      Pick a color:
      <input type="color" id="picker" value="#3264c8" />
    </label>

    <p>
      If you pick a contrast value that's better for users, but doesn't comply
      with WCAG, follow Adrian Roselli's advice and
      <a
        href="https://adrianroselli.com/2026/04/wcag3-contrast-as-of-april-2026.html#:~:text=document%20it%20and%20have%20a%20ready%20response%20should%20you%20receive%20a%20drive%2Dby%20lawsuit%20from%20a%20bad%20actor"
        target="_blank"
        rel="noopener noreferrer"
        >document it</a
      >.
    </p>

    <script>
      const picker = document.getElementById('picker');

      function update(color) {
        document.documentElement.style.setProperty('--bg', color);
      }

      picker.addEventListener('input', (e) => {
        location.replace('#' + e.target.value.slice(1));
        update(e.target.value);
      });

      const initial = location.hash
        ? '#' + location.hash.slice(1)
        : picker.value;
      picker.value = initial;
      update(initial);
    </script>
  </body>
</html>
