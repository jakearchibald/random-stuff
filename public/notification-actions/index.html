<!doctype html>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notification actions</title>
<style>
  html {
    font-family: system-ui;
    line-height: 1.5;
    color-scheme: light dark;
  }
  body {
    max-width: 40rem;
    margin: 2rem auto;
    padding: 0 1rem;
  }
  button {
    font: inherit;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
  }
  #log {
    margin-top: 1.5rem;
    padding: 0.75rem;
    border: 1px solid currentColor;
    border-radius: 4px;
    min-height: 4rem;
    white-space: pre-wrap;
    font-family: ui-monospace, monospace;
    font-size: 0.85rem;
  }
  .status {
    font-style: italic;
    opacity: 0.8;
  }
</style>

<h1>Notification actions</h1>

<p>
  This demo registers a service worker and uses
  <code>ServiceWorkerRegistration.showNotification()</code> to show a
  notification with action buttons. The service worker handles clicks on those
  actions in its <code>notificationclick</code> event.
</p>

<p>
  <button id="show">Show notification with actions</button>
</p>

<p class="status" id="status">Initialising…</p>

<div id="log" aria-live="polite"></div>

<script type="module">
  const statusEl = document.querySelector('#status');
  const logEl = document.querySelector('#log');
  const showButton = document.querySelector('#show');
  if (!('serviceWorker' in navigator)) {
    statusEl.textContent = 'Service workers are not supported in this browser.';
    showButton.disabled = true;
  } else if (!('Notification' in window)) {
    statusEl.textContent = 'Notifications are not supported in this browser.';
    showButton.disabled = true;
  } else {
    // Relay messages posted back from the service worker when an action is
    // clicked.
    navigator.serviceWorker.addEventListener('message', (event) => {
      if (event.data?.type === 'notification-action') {
        console.log(
          `Action clicked: ${event.data.action || '(notification body)'}`,
        );
      }
    });

    register();
  }

  async function register() {
    try {
      const registration = await navigator.serviceWorker.register('sw.js');
      await navigator.serviceWorker.ready;
      statusEl.textContent = 'Service worker ready.';
      showButton.disabled = false;
      showButton.addEventListener('click', () =>
        showNotification(registration),
      );
    } catch (err) {
      statusEl.textContent = `Service worker registration failed: ${err.message}`;
      showButton.disabled = true;
    }
  }

  async function showNotification(registration) {
    let permission = Notification.permission;

    if (permission === 'default') {
      console.log('Requesting notification permission…');
      permission = await Notification.requestPermission();
    }

    if (permission !== 'granted') {
      console.log(`Permission ${permission}. Cannot show notification.`);
      return;
    }

    await registration.showNotification('New message', {
      body: 'Hey! Firefox now supports notification actions!',
      tag: 'demo-notification',
      // Browsers cap the number of actions shown — check maxActions.
      actions: [
        { action: 'archive', title: 'Archive' },
        { action: 'quick-reply', title: 'Quick reply' },
      ],
    });

    console.log(
      `Notification shown (browser shows up to ` +
        `${Notification.maxActions} actions).`,
    );
  }
</script>
