<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>position-try-order: most-block-size</title>
    <style>
      button {
        position: absolute;
        top: 50%;
      }

      [popover] {
        position-area: bottom;
        position-try-fallbacks: flip-block;
        position-try-order: most-block-size;
      }
    </style>
  </head>
  <body>
    <button commandfor="pop" command="toggle-popover">Toggle popover</button>
    <div id="pop" popover>hello</div>
  </body>
</html>
