<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>No-select version</title>
  </head>
  <body>
    <div class="programming-lang-select">
      <div class="option-group">
        <span class="group-label">Markup Languages</span>
        <div class="option" data-value="html" tabindex="0">HTML</div>
        <div class="option" data-value="css" tabindex="0">CSS</div>
        <div class="option" data-value="xml" tabindex="0">XML</div>
        <div class="option" data-value="svg" tabindex="0">SVG</div>
        <div class="option" data-value="markdown" tabindex="0">Markdown</div>
      </div>

      <div class="option-group">
        <span class="group-label">Scripting Languages</span>
        <div class="option" data-value="javascript" tabindex="0">
          JavaScript
        </div>
        <div class="option" data-value="python" tabindex="0">Python</div>
        <div class="option" data-value="ruby" tabindex="0">Ruby</div>
      </div>
    </div>
  </body>
</html>
